steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "--build-arg",
        "NEXT_PUBLIC_GA_ID=G-XVML649J81",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/clearfork-insurance:$SHORT_SHA",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/clearfork-insurance:latest",
        ".",
      ]

  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "--all-tags",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/clearfork-insurance",
      ]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "clearfork-insurance",
        "--image",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/clearfork-insurance:$SHORT_SHA",
        "--region",
        "us-central1",
        "--platform",
        "managed",
        "--allow-unauthenticated",
        "--port",
        "8080",
        "--memory",
        "512Mi",
        "--cpu",
        "1",
        "--min-instances",
        "0",
        "--max-instances",
        "10",
        "--set-env-vars",
        "NODE_ENV=production",
      ]

images:
  - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/clearfork-insurance"

options:
  logging: CLOUD_LOGGING_ONLY
